<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פתיחת תיק — בנק הבינלאומי</title>
  <link rel="stylesheet" href="snifit.css">
  <style>
    .main { padding: 32px; max-width: 800px; margin: 0 auto; }

    .form-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .form-card-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--navy-50);
    }
    .form-card-title { font-size: 15px; font-weight: 700; color: var(--navy); }
    .form-card-body { padding: 24px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-row.single { grid-template-columns: 1fr; }
    .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
    .form-row:last-child { margin-bottom: 0; }

    .add-customer {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--navy);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 0;
      border: none;
      background: none;
    }
    .add-customer:hover { text-decoration: underline; }

    .customer-block {
      border: 1px dashed var(--navy-100);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 16px;
      background: var(--navy-50);
    }
    .customer-block-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .remove-btn { color: var(--red); cursor: pointer; font-size: 12px; border: none; background: none; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo"><img src="logo-habeinleumi.png" alt="הבינלאומי — משקיעים בך" class="header-logo-img"></div>
  <div class="header-user">
    <span>שלום, דנה לוי</span>
    <div class="avatar">ד</div>
  </div>
</header>

<nav class="breadcrumb">
  <a href="dashboard.html">לוח בקרה</a>
  <span class="sep">›</span>
  <span class="current">פתיחת תיק חדש</span>
</nav>

<div class="steps-bar">
  <div class="step active"><div class="step-num">1</div>פרטי תיק</div>
  <span class="step-arrow">‹</span>
  <div class="step"><div class="step-num">2</div>שאלון</div>
  <span class="step-arrow">‹</span>
  <div class="step"><div class="step-num">3</div>מסמכים ומשימות</div>
</div>

<div class="main">

  <div class="form-card">
    <div class="form-card-header">
      <span style="font-size:18px">👤</span>
      <div class="form-card-title">פרטי לקוח</div>
    </div>
    <div class="form-card-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">תעודת זהות <span class="required">*</span></label>
          <input type="text" class="form-input" placeholder="000000000" maxlength="9">
        </div>
        <div class="form-group">
          <label class="form-label">שם מלא <span class="required">*</span></label>
          <input type="text" class="form-input" placeholder="שם פרטי ושם משפחה" value="ישראל ישראלי">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">טלפון <span class="required">*</span></label>
          <input type="tel" class="form-input" placeholder="05X-XXXXXXX">
        </div>
        <div class="form-group">
          <label class="form-label">דואר אלקטרוני <span class="required">*</span></label>
          <input type="email" class="form-input" placeholder="name@email.com">
        </div>
      </div>

      <div id="extraCustomers"></div>
      <button class="add-customer" onclick="addCustomer()">
        ＋ הוסף לווה נוסף
      </button>
    </div>
  </div>

  <div class="form-card">
    <div class="form-card-header">
      <span style="font-size:18px">🏠</span>
      <div class="form-card-title">פרטי העסקה</div>
    </div>
    <div class="form-card-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">סוג עסקה <span class="required">*</span></label>
          <select class="form-select">
            <option value="">— בחר סוג עסקה —</option>
            <option selected>רכישת דירה יד שניה</option>
            <option>רכישה מקבלן עם ליווי בנקאי</option>
            <option>רכישה מקבלן ללא ליווי</option>
            <option>פרויקטים במחיר מפוקח</option>
            <option>רכישת מגרש יד שניה</option>
            <option>בניה עצמית</option>
            <option>הרחבה</option>
            <option>שיפוצים</option>
            <option>כיסוי חובות</option>
            <option>לכל מטרה</option>
            <option>עזרה לצד ג'</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">סוג בטוחה <span class="required">*</span></label>
          <select class="form-select">
            <option value="">— בחר סוג בטוחה —</option>
            <option selected>משכנתא</option>
            <option>הערת אזהרה</option>
            <option>הלווה בהערת אזהרה</option>
            <option>המוכר בהערת אזהרה</option>
            <option>התחייבות עורך דין</option>
            <option>התחייבות חברה</option>
            <option>התחייבות מנהל</option>
          </select>
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label class="form-label">מקום רישום הנכס <span class="required">*</span></label>
          <div class="autocomplete-wrap">
            <input type="text" class="form-input" id="cityInput" placeholder="הקלד עיר..." autocomplete="off" oninput="filterCities(this.value)" onblur="setTimeout(()=>closeAuto(),150)">
            <div class="autocomplete-list" id="cityList"></div>
          </div>
          <div class="form-hint">טאבו / רשות מקרקעי ישראל / חברה</div>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="footer-bar">
  <button class="btn-back" onclick="window.location.href='dashboard.html'">← חזרה</button>
  <button class="btn-next" onclick="window.location.href='shaelone.html'">
    המשך לשאלון ←
  </button>
</div>

<script>
  const cities = ['תל אביב','ירושלים','חיפה','באר שבע','ראשון לציון','פתח תקווה','אשדוד','נתניה','בני ברק','חולון','בת ים','רמת גן','אשקלון','רחובות','הרצליה','כפר סבא','מודיעין','רמלה','לוד','הוד השרון','רעננה','קריית שמונה','טבריה','עפולה','נצרת','אילת','דימונה','ערד','ירוחם','אום אל-פחם'];

  function filterCities(val) {
    const list = document.getElementById('cityList');
    if (!val) { list.classList.remove('open'); return; }
    const matches = cities.filter(c => c.includes(val)).slice(0, 6);
    if (!matches.length) { list.classList.remove('open'); return; }
    list.innerHTML = matches.map(c => `<div class="autocomplete-item" onmousedown="selectCity('${c}')">${c}</div>`).join('');
    list.classList.add('open');
  }
  function selectCity(city) {
    document.getElementById('cityInput').value = city;
    closeAuto();
  }
  function closeAuto() {
    document.getElementById('cityList').classList.remove('open');
  }

  let customerCount = 1;
  function addCustomer() {
    customerCount++;
    const container = document.getElementById('extraCustomers');
    const block = document.createElement('div');
    block.className = 'customer-block';
    block.id = 'customer_' + customerCount;
    block.innerHTML = `
      <div class="customer-block-title">
        לווה ${customerCount}
        <button class="remove-btn" onclick="removeCustomer(${customerCount})">✕ הסר</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">תעודת זהות</label>
          <input type="text" class="form-input" placeholder="000000000" maxlength="9">
        </div>
        <div class="form-group">
          <label class="form-label">שם מלא</label>
          <input type="text" class="form-input" placeholder="שם פרטי ושם משפחה">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">טלפון</label>
          <input type="tel" class="form-input" placeholder="05X-XXXXXXX">
        </div>
        <div class="form-group">
          <label class="form-label">דואר אלקטרוני</label>
          <input type="email" class="form-input" placeholder="name@email.com">
        </div>
      </div>
    `;
    container.appendChild(block);
  }
  function removeCustomer(id) {
    document.getElementById('customer_' + id).remove();
  }
</script>
</body>
</html>
